resources:
  - ../../base
  - quota.yaml
  - limitrange.yaml
  - networkpolicy-deny-all.yaml
  - networkpolicy-ingress.yaml
  - networkpolicy-egress.yaml
namespace: app-prod

patches:
  - target:
      kind: ConfigMap
      name: demo-app-config
    patch: |-
      - op: replace
        path: /data/ENV_NAME
        value: prod
      - op: replace
        path: /data/LOG_LEVEL
        value: warn