apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: node-app-ingress
  namespace: tp-app-mysql
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: tp-app-mysql.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: node-app-service   # service pour l’API
                port:
                  number: 80
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: admin-service      # service pour l’admin
                port:
                  number: 80